<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin:0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; background:#f0ece8; gap:20px; font-family:Georgia,serif; }
  .icon { width:512px; height:512px; }
  button { padding:10px 24px; background:#8a7968; color:#f6f0e8; border:none; border-radius:4px; font-size:14px; cursor:pointer; letter-spacing:0.08em; }
</style>
</head>
<body>
<svg class="icon" id="svg" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="112" fill="#f6f0e8"/>
  <text x="256" y="240" text-anchor="middle"
    font-family="Georgia, serif"
    font-size="190"
    fill="#8a7968">L</text>
  <rect x="187" y="268" width="138" height="2" fill="#8a7968" opacity="0.3"/>
  <text x="268" y="330" text-anchor="middle"
    font-family="Georgia, serif"
    font-size="36"
    letter-spacing="24"
    fill="#8a7968" opacity="0.6">LOG</text>
</svg>
<button onclick="ladda()">Ladda ner icon.png</button>
<canvas id="c" width="512" height="512" style="display:none"></canvas>
<script>
function ladda(){
  const svg=document.getElementById('svg');
  const xml=new XMLSerializer().serializeToString(svg);
  const blob=new Blob([xml],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=()=>{
    const c=document.getElementById('c');
    c.getContext('2d').drawImage(img,0,0);
    const a=document.createElement('a');
    a.download='icon.png';
    a.href=c.toDataURL('image/png');
    a.click();
    URL.revokeObjectURL(url);
  };
  img.src=url;
}
</script>
</body>
</html>
